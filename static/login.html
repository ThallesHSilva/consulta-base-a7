<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Entrar - A7 Connect</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body class="auth-body">
    <main class="auth-shell">
      <section class="auth-brand-panel">
        <img class="auth-logo" src="/static/assets/a7connect-logo.jpg" alt="A7 Connect" />
        <div>
          <span class="eyebrow">Consulta Base</span>
          <h1>Acesso seguro ao painel comercial</h1>
          <p>Entre com sua conta autorizada para consultar clientes e indicadores internos.</p>
        </div>
      </section>

      <section class="auth-card dashboard-card" aria-label="Login">
        <div class="auth-tabs">
          <a class="auth-tab active" href="/login">Entrar</a>
          <a class="auth-tab" href="/cadastro">Criar conta</a>
        </div>
        <div class="auth-heading">
          <h2>Entrar</h2>
          <p>Use seu e-mail corporativo e senha.</p>
        </div>
        <form id="loginForm" class="auth-form">
          <label>
            <span>E-mail</span>
            <input id="loginEmail" name="email" type="email" autocomplete="email" required />
          </label>
          <label>
            <span>Senha</span>
            <input id="loginPassword" name="senha" type="password" autocomplete="current-password" required />
          </label>
          <div class="auth-form-row">
            <a class="text-link" href="/esqueci-senha">Esqueci minha senha</a>
          </div>
          <button class="gradient-button auth-submit" type="submit">Entrar</button>
          <p id="authMessage" class="auth-message" aria-live="polite" hidden></p>
          <button id="resendVerificationButton" class="text-link centered" type="button" hidden>
            Reenviar e-mail de confirmação
          </button>
        </form>
      </section>
    </main>

    <script src="/static/auth.js"></script>
  </body>
</html>
