<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Confirme seu e-mail - A7 Connect</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body class="auth-body">
    <main class="auth-shell single">
      <section class="auth-card dashboard-card auth-state-card">
        <img class="auth-logo small" src="/static/assets/a7connect-logo.jpg" alt="A7 Connect" />
        <span class="badge neutral">VALIDAÇÃO DE E-MAIL</span>
        <h1>Confira sua caixa de entrada</h1>
        <p id="pendingMessage">
          Enviamos um link de confirmação para o e-mail informado. O link é válido por 24 horas.
        </p>
        <p>
          Após confirmar o e-mail, seu cadastro ficará disponível para aprovação do administrador.
        </p>
        <button id="resendVerificationButton" class="ghost-button" type="button">
          Reenviar e-mail
        </button>
        <p id="emailVerificationMessage" class="auth-message" aria-live="polite" hidden></p>
        <a class="text-link" href="/login">Voltar para login</a>
      </section>
    </main>
    <script src="/static/auth.js"></script>
  </body>
</html>
