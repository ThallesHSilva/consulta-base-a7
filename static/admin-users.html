<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Painel Administrativo - A7 Connect</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="app-layout">
      <aside class="sidebar" aria-label="Navegação principal">
        <div class="sidebar-brand">
          <img class="brand-logo" src="/static/assets/a7connect-logo.jpg" alt="A7 Connect" />
        </div>

        <nav class="sidebar-nav">
          <a class="nav-item" href="/app" title="Consulta por CNPJ">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M14 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9Z" />
              <path d="M14 3v6h6" />
              <path d="M9 14h6" />
              <path d="M9 18h4" />
            </svg>
            <span>Consulta por CNPJ</span>
          </a>
          <a class="nav-item" href="/historico" title="Histórico">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3 12a9 9 0 1 0 3-6.7" />
              <path d="M3 4v5h5" />
              <path d="M12 7v5l3 2" />
            </svg>
            <span>Histórico</span>
          </a>
          <a id="adminNavItem" class="nav-item active" href="/admin/usuarios" title="Painel Administrativo">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
              <circle cx="9" cy="7" r="4" />
              <path d="M22 21v-2a4 4 0 0 0-3-3.9" />
              <path d="M16 3.1a4 4 0 0 1 0 7.8" />
            </svg>
            <span>Painel Administrativo</span>
          </a>
        </nav>

        <div class="sidebar-footer">
          <div class="user-card">
            <span id="currentUserInitials" class="avatar" aria-hidden="true">--</span>
            <div>
              <strong id="currentUserName">Usuário</strong>
              <span id="currentUserRole">Perfil</span>
            </div>
          </div>
          <button id="logoutButton" class="logout-button" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
              <path d="M16 17l5-5-5-5" />
              <path d="M21 12H9" />
            </svg>
            <span>Sair</span>
          </button>
        </div>
      </aside>

      <main class="workspace">
        <header class="page-header">
          <button id="sidebarToggle" class="sidebar-toggle" type="button" aria-label="Abrir menu">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 7h16" />
              <path d="M4 12h16" />
              <path d="M4 17h16" />
            </svg>
          </button>
          <div class="title-stack">
            <span class="eyebrow">Administração</span>
            <h1>Painel Administrativo</h1>
            <p>Gerencie aprovações, bloqueios e cadastros de usuários.</p>
          </div>
        </header>

        <section class="dashboard-card data-upload-panel" aria-label="Atualização de bases CSV">
          <div class="panel-title-row">
            <div>
              <span class="eyebrow">Bases CSV</span>
              <h2>Atualização de bases</h2>
            </div>
            <span class="badge neutral">Acesso administrador</span>
          </div>
          <form id="dataUploadForm" class="data-upload-form" enctype="multipart/form-data">
            <div class="upload-grid">
              <label class="file-upload">
                <span>MAPA PARQUE.csv</span>
                <input id="uploadMapaParque" name="mapa_parque" type="file" accept=".csv,text/csv" />
              </label>
              <label class="file-upload">
                <span>PARQUE MOVEL.csv</span>
                <input id="uploadParqueMovel" name="parque_movel" type="file" accept=".csv,text/csv" />
              </label>
              <label class="file-upload">
                <span>PARQUE FIXA.csv</span>
                <input id="uploadParqueFixa" name="parque_fixa" type="file" accept=".csv,text/csv" />
              </label>
            </div>
            <div class="upload-actions">
              <p id="dataUploadMessage" class="auth-message" aria-live="polite" hidden></p>
              <button id="dataUploadButton" class="gradient-button" type="submit">
                <span class="button-content">
                  Enviar e atualizar base
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 3v12" />
                    <path d="m7 8 5-5 5 5" />
                    <path d="M5 21h14" />
                  </svg>
                </span>
                <span class="button-spinner" aria-hidden="true"></span>
              </button>
            </div>
          </form>
          <div id="dataUploadSummary" class="upload-summary" hidden></div>
        </section>

        <section class="dashboard-card admin-toolbar" aria-label="Filtros de usuários">
          <label>
            <span>Pesquisar</span>
            <input id="adminSearchInput" type="search" placeholder="Nome ou e-mail" />
          </label>
          <label>
            <span>Status</span>
            <select id="adminStatusFilter">
              <option value="">Todos</option>
              <option value="PENDENTE_APROVACAO">Pendentes</option>
              <option value="ATIVO">Ativos</option>
              <option value="BLOQUEADO">Bloqueados</option>
              <option value="CANCELADO">Cancelados</option>
            </select>
          </label>
          <button id="adminRefreshButton" class="ghost-button" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M21 12a9 9 0 0 1-15 6.7" />
              <path d="M3 12A9 9 0 0 1 18 5.3" />
              <path d="M18 2v4h-4" />
              <path d="M6 22v-4h4" />
            </svg>
            <span>Atualizar</span>
          </button>
        </section>

        <section class="dashboard-card admin-panel" aria-label="Usuários cadastrados">
          <div class="panel-title-row">
            <div>
              <span class="eyebrow">Usuários</span>
              <h2>Cadastros</h2>
            </div>
            <span id="adminUsersCount" class="badge neutral">0 usuários</span>
          </div>
          <p id="adminMessage" class="auth-message" aria-live="polite" hidden></p>
          <div class="admin-table-wrap">
            <table class="detail-table admin-table">
              <thead>
                <tr>
                  <th>Usuário</th>
                  <th>Perfil</th>
                  <th>Status</th>
                  <th>Criação</th>
                  <th>Último login</th>
                  <th>Ações</th>
                </tr>
              </thead>
              <tbody id="adminUsersBody"></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>

    <script src="/static/session.js"></script>
    <script src="/static/auth.js"></script>
  </body>
</html>
